name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      integration:
        description: Run Docker-backed Kerberos integration dependencies
        required: false
        type: boolean
        default: false
      test_ad:
        description: Set TESTAD=1 for Active Directory gated tests
        required: false
        type: boolean
        default: false
      test_kpasswd:
        description: Set TEST_KPASSWD=1 for live password-change integration coverage
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: ${{ matrix.os }} / ${{ matrix.toolchain }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        toolchain: [stable]
        include:
          - os: ubuntu-latest
            toolchain: "1.88"
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo check --no-default-features
      - run: cargo check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-features
      - run: cargo doc --all-features --no-deps
      - run: cargo package --locked

  i686:
    name: i686 check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: i686-unknown-linux-gnu
      - run: cargo check --all-features --target i686-unknown-linux-gnu

  prek:
    name: prek
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: j178/prek-action@v2

  integration:
    name: Docker-backed integration
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.integration == true }}
    env:
      INTEGRATION: "1"
      TESTPRIVILEGED: "1"
      TESTAD: ${{ inputs.test_ad && '1' || '0' }}
      TESTAD_REQUIRED: ${{ inputs.test_ad && '1' || '0' }}
      TEST_KPASSWD: ${{ inputs.test_kpasswd && '1' || '0' }}
      TEST_AD_USER_KDC_ADDR: ${{ secrets.TEST_AD_USER_KDC_ADDR }}
      TEST_AD_RESOURCE_KDC_ADDR: ${{ secrets.TEST_AD_RESOURCE_KDC_ADDR }}
      TEST_AD_USER_ADMIN_ADDR: ${{ secrets.TEST_AD_USER_ADMIN_ADDR }}
      TEST_AD_RESOURCE_ADMIN_ADDR: ${{ secrets.TEST_AD_RESOURCE_ADMIN_ADDR }}
      TEST_AD_TESTUSER1_KEYTAB_BASE64: ${{ secrets.TEST_AD_TESTUSER1_KEYTAB_BASE64 }}
      TEST_AD_TESTUSER2_KEYTAB_BASE64: ${{ secrets.TEST_AD_TESTUSER2_KEYTAB_BASE64 }}
      TEST_AD_TESTUSER3_KEYTAB_BASE64: ${{ secrets.TEST_AD_TESTUSER3_KEYTAB_BASE64 }}
      TEST_AD_SYSHTTP_KEYTAB_BASE64: ${{ secrets.TEST_AD_SYSHTTP_KEYTAB_BASE64 }}
      TEST_KDC_ADDR: 127.0.0.1
      TEST_HTTP_URL: http://cname.test.gokrb5
      TEST_HTTP_ADDR: 127.0.0.1
      TEST_DNS_KDC: "1"
      DNS_IP: 127.0.88.53
      DNSUTILS_OVERRIDE_NS: 127.0.88.53:53
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Start gokrb5 integration dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -yq krb5-user dnsutils
          sudo chmod 666 /etc/krb5.conf
          scripts/run-gated-integration.sh start
      - name: Run Rust integration tests
        run: scripts/run-gated-integration.sh test
      - name: Stop gokrb5 integration dependencies
        if: always()
        run: scripts/run-gated-integration.sh stop
